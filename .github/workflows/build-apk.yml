name: Build Flutter APK

on:
  push:
    branches: [ "main", "master", "wajahat" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # ←←← THIS IS THE IMPORTANT FIX ←←←
      - name: Fix namespace issue for old plugins (zego_zim)
        run: |
          echo "Applying namespace fix for zego_zim plugin..."
          cat << EOF >> android/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android') && !project.android.hasProperty('namespace')) {
                      println "Adding namespace to \${project.name}"
                      project.android {
                          namespace = "com.zego.\${project.name.replace('-', '_')}"
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Verify APK exists
        run: ls -lah build/app/outputs/flutter-apk/

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename APK with date
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/icare-${{ steps.date.outputs.date }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: icare-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload dated APK
        uses: actions/upload-artifact@v4
        with:
          name: icare-${{ steps.date.outputs.date }}
          path: build/app/outputs/flutter-apk/icare-${{ steps.date.outputs.date }}.apk
          retention-days: 30
