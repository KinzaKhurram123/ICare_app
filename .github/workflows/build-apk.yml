name: Build Flutter APK

on:
  push:
    branches: [ "main", "master", "wajahat" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.8'     # Latest as of April 2026
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # === AGP 9 + afterEvaluate Error Fix ===
      - name: Fix AGP 9 afterEvaluate & Namespace Issue
        run: |
          # Create or append gradle.properties
          echo "android.newDsl=false" >> android/gradle.properties
          
          # Strong namespace fix for old plugins like zego_zim
          cat << 'EOF' >> android/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      if (!project.android.hasProperty('namespace') || project.android.namespace == null) {
                          project.android.namespace = "com.zego.zim"
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Verify APK
        run: ls -lah build/app/outputs/flutter-apk/

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/icare-${{ steps.date.outputs.date }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: icare-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload Dated APK
        uses: actions/upload-artifact@v4
        with:
          name: icare-${{ steps.date.outputs.date }}
          path: build/app/outputs/flutter-apk/icare-${{ steps.date.outputs.date }}.apk
          retention-days: 30
